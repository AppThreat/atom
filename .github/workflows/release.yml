name: release
on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/atom
jobs:
  release-win:
    if: github.repository_owner == 'appthreat'
    concurrency: release-win
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74  # v1.314.0
        with:
          ruby-version: '4.0.5'
          bundler-cache: false
      - name: Set up JDK
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38  # v1.5.6
        with:
          distribution: 'mandrel'
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
          cache: ''
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0
        with:
          arch: amd64
      - run: |
          Invoke-WebRequest -Uri https://github.com/upx/upx/releases/download/v5.0.1/upx-5.0.1-win64.zip -UseBasicParsing -OutFile upx-5.0.1-win64.zip
          Expand-Archive -Path upx-5.0.1-win64.zip -DestinationPath . -Force
          sbt stage createDistribution
          sbt "GraalVMNativeImage / packageBin"
          .\target\graalvm-native-image\atom.exe --help
          cd target\graalvm-native-image
          (Get-FileHash -Algorithm SHA512 .\atom.exe).hash | Out-File -FilePath .\atom.exe.sha512
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: atom-windows-amd64
          path: target/graalvm-native-image/atom.exe
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            target/graalvm-native-image/atom.exe
            target/graalvm-native-image/atom.exe.sha512


  release-win-arm64:
    if: false
    concurrency: release-win
    runs-on: windows-11-arm
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74  # v1.314.0
        with:
          ruby-version: '4.0.5'
          bundler-cache: false
      - name: Set up JDK
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38  # v1.5.6
        with:
          distribution: 'mandrel'
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
          cache: ''
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0
        with:
          arch: arm64
      - run: |
          Invoke-WebRequest -Uri https://github.com/upx/upx/releases/download/v5.0.1/upx-5.0.1-win64.zip -UseBasicParsing -OutFile upx-5.0.1-win64.zip
          Expand-Archive -Path upx-5.0.1-win64.zip -DestinationPath . -Force
          sbt stage createDistribution
          sbt "GraalVMNativeImage / packageBin"
          .\target\graalvm-native-image\atom.exe --help
          mv .\target\graalvm-native-image\atom.exe .\target\graalvm-native-image\atom-arm64.exe
          cd target\graalvm-native-image
          (Get-FileHash -Algorithm SHA512 .\atom-arm64.exe).hash | Out-File -FilePath .\atom-arm64.exe.sha512
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            target/graalvm-native-image/atom-arm64.exe
            target/graalvm-native-image/atom-arm64.exe.sha512

  release:
    if: github.repository_owner == 'appthreat'
    concurrency: release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38  # v1.5.6
        with:
          distribution: 'mandrel'
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
          cache: ''
      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821  # v1.4.0
      - uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02  # v3.0.0
        with:
          apps: scala3 scalac
      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
      - run: |
          wget https://github.com/upx/upx/releases/download/v5.0.1/upx-5.0.1-amd64_linux.tar.xz
          tar -xvf upx-5.0.1-amd64_linux.tar.xz
          chmod +x upx-5.0.1-amd64_linux/upx
          sudo cp upx-5.0.1-amd64_linux/upx /usr/local/bin/
          sbt stage createDistribution
          sha512sum target/atom.zip > target/atom.zip.sha512
          bash ci/native-image.sh
          cp target/graalvm-native-image/atom target/graalvm-native-image/atom-amd64
          /usr/local/bin/upx -9 --lzma target/graalvm-native-image/atom-amd64
          target/graalvm-native-image/atom-amd64 --help
          sha512sum target/graalvm-native-image/atom-amd64 > target/graalvm-native-image/atom-amd64.sha512
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: sbt publish
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload atom to ghcr
        run: |
          cd target
          echo $GITHUB_TOKEN | oras login ghcr.io -u $GITHUB_USERNAME --password-stdin
          oras push ghcr.io/$IMAGE_NAME:v2 \
            --artifact-type application/vnd.oras.config.v1+json \
            ./atom.zip:application/vnd.appthreat.atom.layer.v1+tar \
            ./atom.zip.sha512:application/vnd.appthreat.atom.layer.v1+tar
          cd graalvm-native-image
          oras push ghcr.io/appthreat/atom-amd64:v2 \
            --artifact-type application/vnd.oras.config.v1+json \
            ./atom-amd64:application/vnd.appthreat.atom.layer.v1+tar \
            ./atom-amd64.sha512:application/vnd.appthreat.atom.layer.v1+tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
      - name: Generate SBOM with cdxgen
        run: |
          npm install -g @cyclonedx/cdxgen
          cdxgen -t sbt -o bom.json . -p --no-recurse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: atom-linux-amd64
          path: target/graalvm-native-image/atom-amd64
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            bom.json
            target/atom.zip
            target/atom.zip.sha512
            target/graalvm-native-image/atom-amd64
            target/graalvm-native-image/atom-amd64.sha512


  release-arm64:
    if: github.repository_owner == 'appthreat'
    concurrency: release-arm64
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38  # v1.5.6
        with:
          distribution: 'mandrel'
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
          cache: ''
      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821  # v1.4.0
      - uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02  # v3.0.0
        with:
          apps: scala3 scalac
      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
      - run: |
          wget https://github.com/upx/upx/releases/download/v5.0.1/upx-5.0.1-arm64_linux.tar.xz
          tar -xvf upx-5.0.1-arm64_linux.tar.xz
          chmod +x upx-5.0.1-arm64_linux/upx
          sudo cp upx-5.0.1-arm64_linux/upx /usr/local/bin/
          sbt stage createDistribution
          bash ci/native-image.sh
          cp target/graalvm-native-image/atom target/graalvm-native-image/atom-arm64
          /usr/local/bin/upx -9 --lzma target/graalvm-native-image/atom-arm64
          target/graalvm-native-image/atom-arm64 --help
          sha512sum target/graalvm-native-image/atom-arm64 > target/graalvm-native-image/atom-arm64.sha512
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload atom to ghcr
        run: |
          cd target
          echo $GITHUB_TOKEN | oras login ghcr.io -u $GITHUB_USERNAME --password-stdin
          cd graalvm-native-image
          oras push ghcr.io/appthreat/atom-arm64:v2 \
            --artifact-type application/vnd.oras.config.v1+json \
            ./atom-arm64:application/vnd.appthreat.atom.layer.v1+tar \
            ./atom-arm64.sha512:application/vnd.appthreat.atom.layer.v1+tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: atom-linux-arm64
          path: target/graalvm-native-image/atom-arm64
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            target/graalvm-native-image/atom-arm64
            target/graalvm-native-image/atom-arm64.sha512


  release-mac:
    if: github.repository_owner == 'appthreat'
    concurrency: release-mac
    runs-on: macos-15
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38  # v1.5.6
        with:
          distribution: 'mandrel'
          java-version: '25'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
          cache: ''
      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821  # v1.4.0
      - uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02  # v3.0.0
        with:
          apps: scala3 scalac
      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
      - run: |
          brew install coreutils
          sbt stage createDistribution
          bash ci/native-image.sh
          cp target/graalvm-native-image/atom target/graalvm-native-image/atom-darwin-arm64
          sha512sum target/graalvm-native-image/atom-darwin-arm64 > target/graalvm-native-image/atom-darwin-arm64.sha512
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload atom to ghcr
        run: |
          cd target
          echo $GITHUB_TOKEN | oras login ghcr.io -u $GITHUB_USERNAME --password-stdin
          cd graalvm-native-image
          oras push ghcr.io/appthreat/atom-darwin-arm64:v2 \
            --artifact-type application/vnd.oras.config.v1+json \
            ./atom-darwin-arm64:application/vnd.appthreat.atom.layer.v1+tar \
            ./atom-darwin-arm64.sha512:application/vnd.appthreat.atom.layer.v1+tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: atom-darwin-arm64
          path: target/graalvm-native-image/atom-darwin-arm64
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            target/graalvm-native-image/atom-darwin-arm64
            target/graalvm-native-image/atom-darwin-arm64.sha512


  release-linux-musl-amd64:
    if: github.repository_owner == 'appthreat'
    concurrency: release-linux-musl-amd64
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
      - run: |
          wget https://github.com/upx/upx/releases/download/v5.0.1/upx-5.0.1-amd64_linux.tar.xz
          tar -xvf upx-5.0.1-amd64_linux.tar.xz
          chmod +x upx-5.0.1-amd64_linux/upx
          sudo cp upx-5.0.1-amd64_linux/upx /usr/local/bin/
          bash ci/native-image-musl.sh --arch amd64 --output target/graalvm-native-image/atom-linux-musl-amd64
          /usr/local/bin/upx -9 --lzma target/graalvm-native-image/atom-linux-musl-amd64
          docker run --rm -v "$(pwd):/workspace" -w /workspace alpine:3.22 /bin/sh -c "target/graalvm-native-image/atom-linux-musl-amd64 --help"
          sha512sum target/graalvm-native-image/atom-linux-musl-amd64 > target/graalvm-native-image/atom-linux-musl-amd64.sha512
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload atom to ghcr
        run: |
          cd target/graalvm-native-image
          echo $GITHUB_TOKEN | oras login ghcr.io -u $GITHUB_USERNAME --password-stdin
          oras push ghcr.io/appthreat/atom-linux-musl-amd64:v2 \
            --artifact-type application/vnd.oras.config.v1+json \
            ./atom-linux-musl-amd64:application/vnd.appthreat.atom.layer.v1+tar \
            ./atom-linux-musl-amd64.sha512:application/vnd.appthreat.atom.layer.v1+tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: atom-linux-amd64-musl
          path: target/graalvm-native-image/atom-linux-musl-amd64
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            target/graalvm-native-image/atom-linux-musl-amd64
            target/graalvm-native-image/atom-linux-musl-amd64.sha512


  release-linux-musl-arm64:
    if: false
    concurrency: release-linux-musl-arm64
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0
      - run: |
          wget https://github.com/upx/upx/releases/download/v5.0.1/upx-5.0.1-arm64_linux.tar.xz
          tar -xvf upx-5.0.1-arm64_linux.tar.xz
          chmod +x upx-5.0.1-arm64_linux/upx
          sudo cp upx-5.0.1-arm64_linux/upx /usr/local/bin/
          bash ci/native-image-musl.sh --arch arm64 --output target/graalvm-native-image/atom-linux-musl-arm64
          /usr/local/bin/upx -9 --lzma target/graalvm-native-image/atom-linux-musl-arm64
          docker run --rm -v "$(pwd):/workspace" -w /workspace alpine:3.22 /bin/sh -c "target/graalvm-native-image/atom-linux-musl-arm64 --help"
          sha512sum target/graalvm-native-image/atom-linux-musl-arm64 > target/graalvm-native-image/atom-linux-musl-arm64.sha512
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload atom to ghcr
        run: |
          cd target/graalvm-native-image
          echo $GITHUB_TOKEN | oras login ghcr.io -u $GITHUB_USERNAME --password-stdin
          oras push ghcr.io/appthreat/atom-linux-musl-arm64:v2 \
            --artifact-type application/vnd.oras.config.v1+json \
            ./atom-linux-musl-arm64:application/vnd.appthreat.atom.layer.v1+tar \
            ./atom-linux-musl-arm64.sha512:application/vnd.appthreat.atom.layer.v1+tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            target/graalvm-native-image/atom-linux-musl-arm64
            target/graalvm-native-image/atom-linux-musl-arm64.sha512

  npm-publish:
    name: Publish NPM Packages
    runs-on: ubuntu-24.04
    needs: [release-win, release, release-arm64, release-mac, release-linux-musl-amd64]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: 'ShiftLeftSecurity/shiftleft-java-example'
          path: 'repotests/shiftleft-java-example'
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '25.x'
          package-manager-cache: false
          scope: '@appthreat'
          registry-url: 'https://registry.npmjs.org'
      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '23'
      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821  # v1.4.0
      - name: Install deps
        run: |
          sudo apt update -y
          sudo apt install -y zlib1g php-zip
      - name: Assemble JAR packages
        run: |
          sbt stage createDistribution
          cd wrapper/nodejs
          # Unzips target/atom.zip and stamps the universal jar + jar-fallback packages.
          bash build.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download Native Binaries
        uses: actions/download-artifact@v4
        with:
          path: wrapper/nodejs/downloaded-binaries
      - name: Assemble native packages
        run: |
          cd wrapper/nodejs
          # Assemble native packages using downloaded per-arch binaries
          node scripts/assemble.mjs @appthreat/atom-linux-amd64 downloaded-binaries/atom-linux-amd64/atom-amd64
          node scripts/assemble.mjs @appthreat/atom-linux-arm64 downloaded-binaries/atom-linux-arm64/atom-arm64
          node scripts/assemble.mjs @appthreat/atom-linux-amd64-musl downloaded-binaries/atom-linux-amd64-musl/atom-linux-musl-amd64
          node scripts/assemble.mjs @appthreat/atom-darwin-arm64 downloaded-binaries/atom-darwin-arm64/atom-darwin-arm64
          node scripts/assemble.mjs @appthreat/atom-windows-amd64 downloaded-binaries/atom-windows-amd64/atom.exe
          
      - name: Run unit tests
        run: |
          cd wrapper/nodejs
          npm run test

      - name: Verify native standalone binary (install-shape + real analysis)
        run: |
          PKGS="$GITHUB_WORKSPACE/wrapper/nodejs/packages"
          VERIFY_DIR="$(mktemp -d)"
          cd "$VERIFY_DIR"
          npm init -y >/dev/null
          npm install "$PKGS/atom-linux-amd64" "$PKGS/atom"
          ATOM="node_modules/@appthreat/atom"
          test -x node_modules/@appthreat/atom-linux-amd64/bin/atom
          # The native binary must NOT fall back to the jar path here.
          node -e "import('$VERIFY_DIR/$ATOM/resolve.js').then(m => { const p = m.locateAtomBinary(); if (!p || p.kind !== 'native') { console.error('Expected native provider, got', p); process.exit(1); } console.log('Resolved native:', p.pkg); })"
          node "$ATOM/index.js" --help
          # Real analysis against a small Java repo (native binary is self-contained for JVM langs).
          node "$ATOM/index.js" -l java -o /tmp/app.atom "$GITHUB_WORKSPACE/repotests/shiftleft-java-example"
          test -s /tmp/app.atom
          echo "Native java analysis produced $(stat -c%s /tmp/app.atom) bytes"

      - name: Verify jar fallback path
        run: |
          PKGS="$GITHUB_WORKSPACE/wrapper/nodejs/packages"
          VERIFY_DIR="$(mktemp -d)"
          cd "$VERIFY_DIR"
          npm init -y >/dev/null
          # Install only the universal jar package + parent: the dispatcher must
          # fall back to the jar runner and use the system JDK. No --omit=optional:
          # atom-jar is itself an optionalDependency of @appthreat/atom and npm 11
          # would drop the directly-requested copy. The unpublished platform packages
          # (3.0.0) 404 as optional deps, tolerated non-fatally.
          npm install "$PKGS/atom-jar" "$PKGS/atom"
          ATOM="node_modules/@appthreat/atom"
          node -e "import('$VERIFY_DIR/$ATOM/resolve.js').then(m => { const p = m.locateAtomBinary(); if (!p || p.kind !== 'jar' || p.pkg !== '@appthreat/atom-jar') { console.error('Expected jar fallback, got', p); process.exit(1); } console.log('Resolved jar fallback:', p.pkg); })"
          node "$ATOM/index.js" --help

      - name: NPM Dry-run Publish (Verify packaging checks)
        run: |
          cd wrapper/nodejs
          for dir in packages/atom-jar packages/atom-linux-amd64 packages/atom-linux-arm64 packages/atom-linux-amd64-musl packages/atom-darwin-arm64 packages/atom-windows-amd64 packages/atom-darwin-amd64 packages/atom-windows-arm64 packages/atom-linux-arm64-musl packages/atom; do
            echo "Dry-run publishing $dir..."
            (cd "$dir" && npm publish --dry-run)
          done
          
      - name: Publish all Packages (Sub-packages first, parent last)
        run: |
          cd wrapper/nodejs
          
          for dir in packages/atom-jar packages/atom-linux-amd64 packages/atom-linux-arm64 packages/atom-linux-amd64-musl packages/atom-darwin-arm64 packages/atom-windows-amd64 packages/atom-darwin-amd64 packages/atom-windows-arm64 packages/atom-linux-arm64-musl; do
            echo "Publishing $dir..."
            (cd "$dir" && npm publish --provenance --access=public)
          done
          
          echo "Publishing parent @appthreat/atom..."
          (cd packages/atom && npm publish --provenance --access=public)
        if: startsWith(github.ref, 'refs/tags/')

  npm-release-tests:
    name: Post-publish smoke test
    runs-on: ${{ matrix.os }}
    needs: npm-publish
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, windows-latest]
    permissions:
      contents: read
    steps:
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '25.x'
          package-manager-cache: false
      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '23'
      - name: Install atom from npm and verify
        shell: bash
        run: |
          # Allow a short window for registry propagation of the freshly published tag.
          sleep 30
          npm install -g @appthreat/atom @appthreat/atom-parsetools
          atom --help
          astgen --version
          rbastgen --help

