name: Release npm package

on:
  push:
    tags:
    - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  pkg:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '25.x'
        package-manager-cache: false
        scope: '@appthreat'
    - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d  # v8.1.1
    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
      with:
        distribution: 'temurin'
        java-version: '21'
    - uses: sbt/setup-sbt@2e222825582620cc38d2a54e674f3c01b7c14f5d  # v1.1.24
    - uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02  # v3.0.0
      with:
        apps: scala3 scalac
    - name: Build
      run: |
        sudo apt update -y
        sudo apt install -y zlib1g php-zip tree
        sbt stage createDistribution
        sha512sum target/atom.zip > target/atom.zip.sha512
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f  # v1.310.0
      with:
        ruby-version: '4.0.0'
        bundler-cache: false
    - name: Prepare 4.0.0 version
      run: |
        cd wrapper/nodejs
        npm publish --dry-run
    - name: Publish
      run: |
        cd wrapper/nodejs
        bash build.sh
        npm publish --provenance --access=public
      if: startsWith(github.ref, 'refs/tags/')
  npm-release-tests:
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    needs: pkg
    permissions:
      contents: read
    steps:
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '25.x'
          package-manager-cache: false
      - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d  # v8.1.1
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Install atom latest
        run: |
          npm install -g @appthreat/atom @appthreat/atom-parsetools
          atom --help
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f  # v1.310.0
        with:
          ruby-version: '4.0.0'
          bundler-cache: false
      - name: Check rbastgen 4.0.0
        run: |
          rbastgen --help
