name: Upload Container images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/atom

jobs:
  deploy:
    if: github.repository_owner == 'appthreat'
    strategy:
      fail-fast: true
      matrix:
        image:
          - id: amd64
            arch: amd64
          - id: arm64
            arch: arm64
            runner-suffix: -arm
          - id: amd64-sle
            arch: amd64
            image-suffix: -sle
          - id: arm64-sle
            arch: arm64
            image-suffix: -sle
            runner-suffix: -arm
          - id: amd64-ruby
            arch: amd64
            image-suffix: -ruby
          - id: arm64-ruby
            arch: arm64
            image-suffix: -ruby
            runner-suffix: -arm
          - id: amd64-ruby3
            arch: amd64
            image-suffix: -ruby3
          - id: arm64-ruby3
            arch: arm64
            image-suffix: -ruby3
            runner-suffix: -arm
          - id: amd64-alpine-ruby
            arch: amd64
            image-suffix: -alpine-ruby
          - id: arm64-alpine-ruby
            arch: arm64
            image-suffix: -alpine-ruby
            runner-suffix: -arm
          - id: amd64-alpine-ruby3
            arch: amd64
            image-suffix: -alpine-ruby3
          - id: arm64-alpine-ruby3
            arch: arm64
            image-suffix: -alpine-ruby3
            runner-suffix: -arm
    runs-on: ubuntu-24.04${{ matrix.image.runner-suffix }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821  # v1.4.0
      - uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02  # v3.0.0
        with:
          apps: scala3 scalac
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '25.x'
          package-manager-cache: false
      - name: Delete `.rustup` directory
        run: rm -rf /home/runner/.rustup # to save disk space
        if: runner.os == 'Linux'
      - name: Delete `.cargo` directory # to save disk space
        run: rm -rf /home/runner/.cargo
        if: runner.os == 'Linux'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.sbt
            ~/.coursier
          key: ${{ runner.os }}-sbt-${{ hashfiles('**/build.sbt') }}
          lookup-only: true
      - run: |
          sbt stage createDistribution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ghcr.io/appthreat/atom${{ matrix.image.image-suffix }}
          flavor: latest=false,suffix=-${{ matrix.image.arch }}
      - name: Build and push Docker images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        id: build
        with:
          file: ci/Dockerfile${{ matrix.image.image-suffix }}
          context: .
          platforms: linux/${{ matrix.image.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
      - name: Write image metadata
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p image-metadata
          jq -n \
            --arg key "${MATRIX_KEY}" \
            --arg image_uri "ghcr.io/appthreat/atom${IMAGE_SUFFIX}@${DIGEST}" \
            '{($key): {"image-uri": $image_uri}}' > "image-metadata/${MATRIX_KEY}.json"
        env:
          MATRIX_KEY: ${{ matrix.image.id }}
          IMAGE_SUFFIX: ${{ matrix.image.image-suffix }}
          DIGEST: ${{ steps.build.outputs.digest }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: image-metadata-${{ matrix.image.id }}
          path: image-metadata/${{ matrix.image.id }}.json
          if-no-files-found: error
          retention-days: 1

  deploy-manifest:
    if: github.repository_owner == 'appthreat'
    strategy:
      fail-fast: true
      matrix:
        image:
          - id: default
          - id: sle
            image-suffix: -sle
          - id: ruby
            image-suffix: -ruby
          - id: alpine-ruby
            image-suffix: -alpine-ruby
    runs-on: ubuntu-24.04
    needs: [deploy]
    outputs:
      image-uri: ghcr.io/appthreat/atom${{ matrix.image.image-suffix }}@${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        id: metadata
        with:
          images: ghcr.io/appthreat/atom${{ matrix.image.image-suffix }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: image-metadata-*
          path: image-metadata
          merge-multiple: true
      - name: Create and push multi-arch manifest
        id: build
        shell: bash
        run: |
          set -euo pipefail

          annotation_args=()
          while IFS= read -r label; do
            [ -n "${label}" ] || continue
            annotation_args+=(--annotation "index:${label}")
          done <<< "${LABELS}"

          amd64_key="amd64${IMAGE_SUFFIX}"
          arm64_key="arm64${IMAGE_SUFFIX}"
          sources=()
          for key in "${amd64_key}" "${arm64_key}"; do
            metadata_file="$(find image-metadata -name "${key}.json" -type f -print -quit)"
            if [ -z "${metadata_file}" ] || [ ! -s "${metadata_file}" ]; then
              echo "Unable to find image metadata artifact file: ${metadata_file}" >&2
              echo "Downloaded image metadata files:" >&2
              find image-metadata -maxdepth 2 -type f -print >&2 || true
              exit 1
            fi

            source="$(jq -r --arg key "${key}" '.[$key]."image-uri" // empty' "${metadata_file}")"
            if [ -z "${source}" ]; then
              echo "Unable to find source image for matrix output key: ${key}" >&2
              echo "Image metadata:" >&2
              jq . "${metadata_file}" >&2 || true
              exit 1
            fi
            sources+=("${source}")
          done

          if [ "${#sources[@]}" -lt 2 ]; then
            echo "Expected two source images for manifest, found ${#sources[@]}" >&2
            exit 1
          fi

          first_digest=""
          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue

            echo "Creating multi-arch manifest: ${tag}"
            docker buildx imagetools create \
              "${annotation_args[@]}" \
              --tag "${tag}" \
              "${sources[@]}"

            inspect_status=0
            inspect_output="$(docker buildx imagetools inspect "${tag}" 2>&1)" || inspect_status=$?
            printf '%s\n' "${inspect_output}"

            tag_digest="$(awk '$1 == "Digest:" {print $2; exit}' <<< "${inspect_output}")"
            if [ -z "${tag_digest}" ]; then
              echo "Unable to determine manifest digest for ${tag}" >&2
              exit 1
            fi

            if [ "${inspect_status}" -ne 0 ]; then
              echo "::warning::docker buildx imagetools inspect exited with status ${inspect_status} for ${tag}, but reported digest ${tag_digest}; continuing"
            fi

            if [ -z "${first_digest}" ]; then
              first_digest="${tag_digest}"
            fi
          done <<< "${TAGS}"

          if [ -z "${first_digest}" ]; then
            echo "No tags found for manifest" >&2
            exit 1
          fi

          echo "digest=${first_digest}" >> "${GITHUB_OUTPUT}"
        env:
          LABELS: ${{ steps.metadata.outputs.labels }}
          TAGS: ${{ steps.metadata.outputs.tags }}
          IMAGE_SUFFIX: ${{ matrix.image.image-suffix }}
