name: Upload Container images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/atom

jobs:
  deploy:
    if: github.repository_owner == 'appthreat'
    strategy:
      fail-fast: true
      matrix:
        image:
          - id: amd64
            arch: amd64
          - id: arm64
            arch: arm64
            runner-suffix: -arm
          - id: amd64-sle
            arch: amd64
            image-suffix: -sle
          - id: arm64-sle
            arch: arm64
            image-suffix: -sle
            runner-suffix: -arm
          - id: amd64-ruby
            arch: amd64
            image-suffix: -ruby
          - id: arm64-ruby
            arch: arm64
            image-suffix: -ruby
            runner-suffix: -arm
          - id: amd64-ruby3
            arch: amd64
            image-suffix: -ruby3
          - id: arm64-ruby3
            arch: arm64
            image-suffix: -ruby3
            runner-suffix: -arm
          - id: amd64-alpine-ruby
            arch: amd64
            image-suffix: -alpine-ruby
          - id: arm64-alpine-ruby
            arch: arm64
            image-suffix: -alpine-ruby
            runner-suffix: -arm
          - id: amd64-alpine-ruby3
            arch: amd64
            image-suffix: -alpine-ruby3
          - id: arm64-alpine-ruby3
            arch: arm64
            image-suffix: -alpine-ruby3
            runner-suffix: -arm
    runs-on: ubuntu-24.04${{ matrix.image.runner-suffix }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - uses: sbt/setup-sbt@2e222825582620cc38d2a54e674f3c01b7c14f5d  # v1.1.24
      - uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02  # v3.0.0
        with:
          apps: scala3 scalac
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '25.x'
          package-manager-cache: false
      - name: Delete `.rustup` directory
        run: rm -rf /home/runner/.rustup # to save disk space
        if: runner.os == 'Linux'
      - name: Delete `.cargo` directory # to save disk space
        run: rm -rf /home/runner/.cargo
        if: runner.os == 'Linux'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.sbt
            ~/.coursier
          key: ${{ runner.os }}-sbt-${{ hashfiles('**/build.sbt') }}
          lookup-only: true
      - run: |
          sbt stage createDistribution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ghcr.io/appthreat/atom${{ matrix.image.image-suffix }}
          flavor: latest=false,suffix=-${{ matrix.image.arch }}
      - name: Build and push Docker images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        id: build
        with:
          file: ci/Dockerfile${{ matrix.image.image-suffix }}
          context: .
          platforms: linux/${{ matrix.image.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375  # 1.0.0
        id: out
        with:
          matrix-step-name: deploy
          matrix-key: ${{ matrix.image.id }}
          outputs: |-
            image-uri: ghcr.io/appthreat/atom${{ matrix.image.image-suffix }}@${{ steps.build.outputs.digest }}

  deploy-manifest:
    if: github.repository_owner == 'appthreat'
    strategy:
      fail-fast: true
      matrix:
        image:
          - id: default
          - id: sle
            image-suffix: -sle
          - id: ruby
            image-suffix: -ruby
          - id: alpine-ruby
            image-suffix: -alpine-ruby
    runs-on: ubuntu-24.04
    needs: [deploy]
    outputs:
      image-uri: ghcr.io/appthreat/atom${{ matrix.image.image-suffix }}@${{ steps.build.outputs.digest }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        id: metadata
        with:
          images: ghcr.io/appthreat/atom${{ matrix.image.image-suffix }}
      - uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a  # 1.0.0
        id: read
        with:
          matrix-step-name: deploy
      - name: Create and push multi-arch manifest
        id: build
        shell: bash
        run: |
          set -euo pipefail

          annotation_args=()
          while IFS= read -r label; do
            [ -n "${label}" ] || continue
            annotation_args+=(--annotation "index:${label}")
          done <<< "${LABELS}"

          sources=()
          while IFS= read -r source; do
            [ -n "${source}" ] || continue
            sources+=("${source}")
          done <<< "${SOURCES}"

          if [ "${#sources[@]}" -lt 2 ]; then
            echo "Expected two source images for manifest, found ${#sources[@]}" >&2
            exit 1
          fi

          first_tag=""
          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue

            if [ -z "${first_tag}" ]; then
              first_tag="${tag}"
            fi

            echo "Creating multi-arch manifest: ${tag}"
            docker buildx imagetools create \
              "${annotation_args[@]}" \
              --tag "${tag}" \
              "${sources[@]}"

            docker buildx imagetools inspect "${tag}"
          done <<< "${TAGS}"

          if [ -z "${first_tag}" ]; then
            echo "No tags found for manifest" >&2
            exit 1
          fi

          digest="$(docker buildx imagetools inspect "${first_tag}" | awk '$1 == "Digest:" {print $2; exit}')"
          if [ -z "${digest}" ]; then
            echo "Unable to determine manifest digest for ${first_tag}" >&2
            exit 1
          fi

          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
        env:
          LABELS: ${{ steps.metadata.outputs.labels }}
          TAGS: ${{ steps.metadata.outputs.tags }}
          SOURCES: |
            ${{ fromJSON(steps.read.outputs.result).image-uri[format('amd64{0}', matrix.image.image-suffix)] }}
            ${{ fromJSON(steps.read.outputs.result).image-uri[format('arm64{0}', matrix.image.image-suffix)] }}
